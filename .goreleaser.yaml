# Copyright The palan Authors
# SPDX-License-Identifier: Apache-2.0
#
# Release pipeline: static binaries for linux/amd64, linux/arm64, and
# darwin/arm64 (design §13), SBOMs, checksums signed keylessly with cosign
# in CI, and the distroless puller image.

version: 2

project_name: palan

builds:
  - id: palan
    main: ./cmd/palan
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/aimd54/palan/internal/version.version={{ .Version }}
      - -X github.com/aimd54/palan/internal/version.commit={{ .ShortCommit }}
      - -X github.com/aimd54/palan/internal/version.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64 # v0.x targets Linux + macOS arm64 (design §3)

archives:
  - formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

signs:
  # Keyless sigstore bundle over the checksum file (CI provides the OIDC
  # token). cosign v3 writes signature + certificate + transparency-log
  # proof into one .sigstore.json bundle; verify with (cosign ≥ v3):
  #   cosign verify-blob --bundle checksums.txt.sigstore.json \
  #     --certificate-identity-regexp 'github.com/aimd54/palan' \
  #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
  #     checksums.txt
  # No `output: true` here: cosign writes the bundle file itself, and its
  # stdout (a legacy base64 signature) must not clobber it.
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}
    artifacts: checksum

dockers_v2:
  - id: puller
    ids: [palan]
    dockerfile: Dockerfile.release
    images:
      - ghcr.io/aimd54/palan
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.source: https://github.com/aimd54/palan
      org.opencontainers.image.licenses: Apache-2.0
      org.opencontainers.image.description: Distribute and serve GGUF models as OCI artifacts

changelog:
  use: git
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Fixes
      regexp: '^fix'
      order: 1
    - title: Documentation
      regexp: '^docs'
      order: 2
    - title: Other
      order: 999

release:
  footer: |
    ---
    Binaries are static (CGO disabled). The checksum file is signed with
    cosign (keyless); see `.goreleaser.yaml` for the verify command.
