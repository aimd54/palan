version: "2"

linters:
  default: standard
  enable:
    - copyloopvar
    - errorlint
    - gosec
    - misspell
    - unconvert
    - whitespace
  settings:
    errcheck:
      # Human-facing terminal output; a failed write to stdout/stderr is
      # not actionable for a CLI.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    generated: lax
    rules:
      # Tests may exec helper binaries, use fixed temp paths, etc.
      - path: _test\.go
        linters:
          - gosec
      # The GGUF parser bound-checks every length before converting
      # (maxKeyLen/maxStringLen/maxArrayLen); G115 cannot see those guards
      # and its #nosec handling is unreliable.
      - path: internal/gguf/
        linters:
          - gosec
        text: "G115"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/aimd54/palan
