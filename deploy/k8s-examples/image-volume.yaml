#
# Pattern 2 (design §10.2): mount the car-profile image directly as a
# volume. Requires Kubernetes ≥ 1.36 (image volumes GA) and containerd
# ≥ 2.1 — verify on your K3s channel (see README.md checklist).
apiVersion: v1
kind: Pod
metadata:
  name: qwen3-8b-imagevol
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: llama-server
      image: ghcr.io/ggml-org/llama.cpp:server
      args:
        - -m
        # The car layer unpacks under models/ inside the mount.
        - /model/models/qwen3-8b-instruct-q4_k_m.gguf
        - --host
        - 0.0.0.0
        - --port
        - "8080"
      ports:
        - containerPort: 8080
          name: http
      readinessProbe:
        httpGet: { path: /health, port: http }
        initialDelaySeconds: 10
      volumeMounts:
        - name: model
          mountPath: /model
          readOnly: true
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      resources:
        requests: { cpu: "2", memory: 6Gi }
        limits: { memory: 8Gi }
  volumes:
    - name: model
      image:
        # Digest-pin in GitOps: …-car@sha256:<digest>
        reference: registry.internal/llm/qwen3:8b-instruct-q4_k_m-car
        pullPolicy: IfNotPresent
