# OpenSSF Scorecard supply-chain security analysis.
# Results feed the badge in README.md and the repo's code-scanning tab.

name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 2 * * 1' # weekly, Monday 02:30 UTC
  branch_protection_rule:

# Default to no permissions; the job requests exactly what it needs.
permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the OpenSSF REST API (badge)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
