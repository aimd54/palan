name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to no permissions; each job requests exactly what it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.6.1

  lint-docs:
    name: Lint docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24.1.0
        with:
          globs: "**/*.md"

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Format, vet, tidy, unit tests
        run: make fmt-check vet tidy-check test
      - name: Build and smoke-test the binary
        run: |
          make build
          ./bin/palan version

  e2e:
    name: End-to-end and interop
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      zot:
        # Keep the pin in sync with test/e2e/main_test.go.
        image: ghcr.io/project-zot/zot-linux-amd64:v2.1.18
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install interop tools (oras, modctl, cosign)
        env:
          # setup-go pins GOTOOLCHAIN=local to our go.mod minimum; these
          # tools may require newer patch releases — let go auto-fetch them.
          GOTOOLCHAIN: auto
        run: |
          go install oras.land/oras/cmd/oras@v1.3.3
          go install github.com/modelpack/modctl@v0.2.2
          go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.3
      - name: Run e2e suite
        env:
          E2E_REGISTRY: localhost:5000
        run: make e2e

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Scan with current stable Go: govulncheck checks the *standard
          # library* of the toolchain in use, and our go.mod minimum
          # (1.25.0) has stdlib CVEs fixed in later patch releases.
          go-version: stable
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
