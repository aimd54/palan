# markdownlint-cli2 configuration (also used by the CI job).
# Run locally with: make lint-docs (needs Node).

config:
  # Line length: the docs use wide tables and long inline-code/URLs on
  # purpose; wrapping them harms readability more than it helps.
  MD013: false
  # Table pipe alignment: files legitimately mix padded comparison tables
  # with compact link tables; enforcing one style per file fights source
  # readability.
  MD060: false

# Skip anything gitignored (e.g. *.private.md working notes).
gitignore: true

ignores:
  # Generated by cobra (`make docs`); style is the generator's, and hand
  # fixes would be overwritten on regeneration.
  - "docs/reference/**"
  # The design document is a stable record; it is not churned for style
  # (see docs/adr/README.md and the doc's edition note).
  - "docs/design/**"
  - "node_modules/**"
